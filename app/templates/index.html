<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>課題管理アプリ - ステップ2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .input-form { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 課題管理アプリ (保存機能付き)</h1>
        <div class="input-form">
            <input type="text" id="subject" placeholder="授業名">
            <input type="text" id="content" placeholder="内容">
            <input type="date" id="deadline">
            <button onclick="addTask()">登録</button>
        </div>
        <table>
            <thead>
                <tr><th>授業名</th><th>内容</th><th>締切</th></tr>
            </thead>
            <tbody id="task-list"></tbody>
        </table>
    </div>

    <script>
        // 【ステップ2】LocalStorageからデータを読み込む
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        function addTask() {
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value;
            const deadline = document.getElementById('deadline').value;

            if (!subject || !content || !deadline) return alert("入力してください");

            const newTask = { subject, content, deadline };
            tasks.push(newTask);
            
            // 【ステップ2】保存して表示
            saveAndRender();
        }

        function saveAndRender() {
            // LocalStorageに保存
            localStorage.setItem('myTasks', JSON.stringify(tasks));

            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map(t => `
                <tr><td>${t.subject}</td><td>${t.content}</td><td>${t.deadline}</td></tr>
            `).join('');
        }

        // 最初の一回実行
        saveAndRender();
    </script>
</body>
</html>
